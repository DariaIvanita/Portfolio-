<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Me - Daria Ivanita</title>
<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg, #fff0f6, #ffe4ec);
}

/* NAV */
.navbar{
    padding:20px;
    background:rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

.nav-menu{
    display:flex;
    gap:20px;
    list-style:none;
    justify-content:center;
    padding:0;
}

.nav-link{
    text-decoration:none;
    color:#333;
    font-weight:500;
    transition:0.3s;
}

.nav-link:hover{
    color:#ff5fa2;
}

/* CONTACT SECTION */
.contact-section{
    min-height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:60px 20px;
}

/* CARD */
.contact-card{
    background:white;
    padding:40px;
    border-radius:25px;
    box-shadow:0 20px 50px rgba(0,0,0,0.1);
    max-width:500px;
    width:100%;
    animation: fadeIn 0.8s ease;
}

/* IMAGE */
.contact-image{
    width:120px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* TEXT */
h1{
    font-size:2.5rem;
    margin-bottom:20px;
}

.contact-info p{
    font-size:1.1rem;
    margin:10px 0;
}

.contact-info a{
    color:#ff5fa2;
    text-decoration:none;
    font-weight:bold;
}

/* BUTTON STYLE EMAIL */
.email-btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 25px;
    background:#ff5fa2;
    color:white;
    border-radius:50px;
    text-decoration:none;
    transition:0.3s;
}

.email-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(255,95,162,0.3);
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    background:white;
    margin-top:40px;
    color:#777;
}

</style>

</head>

<body>

<!-- NAV -->
<nav class="navbar">
    <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="personal biography.html" class="nav-link">About Me</a></li>
        <li><a href="designerportfoliowork.html" class="nav-link">Designer Portfolio</a></li>
        <li><a href="developerwork.html" class="nav-link">Developer Portfolio</a></li>
        <li><a href="Resume.pdf" class="nav-link" target="_blank">Resume</a></li>
        <li><a href="contactpage.html" class="nav-link">Contact</a></li>
    </ul>
</nav>

<!-- CONTACT -->
<section class="contact-section">

    <h1>Let’s Work Together ✨</h1>

    <div class="contact-card">

        <img src="daria.jpg" alt="Daria" class="contact-image">

        <div class="contact-info">

            <p>I’m open to frontend, UI/UX, and creative design opportunities.</p>

            <p><strong>Email:</strong></p>
            <a href="mailto:dasha.ivanita@gmail.com">dasha.ivanita@gmail.com</a>

            <br><br>

            <a class="email-btn" href="mailto:dasha.ivanita@gmail.com">
                Send Email
            </a>

        </div>

    </div>

</section>

<!-- FOOTER -->
<footer class="footer">
    <p>&copy; 2026 Daria Ivanita. All rights reserved.</p>
</footer>

</body>
</html>
